services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: skyline
    volumes:
      - ./db_data:/var/lib/mysql
      - ./_db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Neo4j Docker requires the initial admin user to be "neo4j"; backend creates NEO4J_USER on startup.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      PUBLIC_URL: ${BACKEND_URL}
      CORS_ORIGIN: ${FRONTEND_URL}
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: skyline
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-skyline_admin}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    command: sh -c "npm install && npm start"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  nextjs:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: http://backend:4000
      FRONTEND_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_API_URL: ${BACKEND_URL}
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && npm start"
    depends_on:
      backend:
        condition: service_started

volumes:
  backend_uploads:
  neo4j_data:
