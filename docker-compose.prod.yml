services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: skyline
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      PUBLIC_URL: ${BACKEND_URL}
      CORS_ORIGIN: ${FRONTEND_URL}
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: skyline
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    command: sh -c "npm install && npm start"
    depends_on:
      db:
        condition: service_healthy

  nextjs:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: http://backend:4000
      FRONTEND_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_API_URL: ${BACKEND_URL}
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && rm -f pnpm-lock.yaml && npm run build && npm start"
    depends_on:
      backend:
        condition: service_started

volumes:
  backend_uploads:
